<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hệ thống Quản lý & Truy xuất Nguồn gốc Chuỗi Cung ứng" />
    <title>Mini Logistic – Supply Chain Traceability</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var storage = localStorage.getItem('theme-storage');
          var isDark = false;
          if (theme) {
            isDark = theme === 'dark';
          } else if (storage) {
            var parsed = JSON.parse(storage);
            isDark = !!(parsed && parsed.state && parsed.state.isDark);
          }
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
